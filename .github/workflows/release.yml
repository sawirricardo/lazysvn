name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (example: v0.1.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Resolve release tag
        id: meta
        run: |
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi

          if [ -z "${TAG}" ]; then
            echo "release tag is empty" >&2
            exit 1
          fi

          echo "tag=${TAG}" >> "${GITHUB_OUTPUT}"

      - name: Run tests
        run: go test ./...

      - name: Build release archives
        env:
          TAG: ${{ steps.meta.outputs.tag }}
        run: |
          set -eux
          mkdir -p dist

          while read -r GOOS GOARCH; do
            [ -n "${GOOS}" ] || continue
            PKG_DIR="dist/lazysvn_${TAG}_${GOOS}_${GOARCH}"
            BIN_PATH="${PKG_DIR}/lazysvn"

            mkdir -p "${PKG_DIR}"
            CGO_ENABLED=0 GOOS="${GOOS}" GOARCH="${GOARCH}" go build -trimpath -ldflags "-s -w" -o "${BIN_PATH}" .
            cp README.md "${PKG_DIR}/README.md"
            tar -C dist -czf "dist/lazysvn_${TAG}_${GOOS}_${GOARCH}.tar.gz" "lazysvn_${TAG}_${GOOS}_${GOARCH}"
            rm -rf "${PKG_DIR}"
          done <<'EOF'
          linux amd64
          linux arm64
          darwin amd64
          darwin arm64
          EOF

          (cd dist && sha256sum lazysvn_*.tar.gz > checksums.txt)

      - name: Create or update GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          target_commitish: ${{ github.sha }}
          name: ${{ steps.meta.outputs.tag }}
          generate_release_notes: true
          files: |
            dist/lazysvn_*.tar.gz
            dist/checksums.txt
