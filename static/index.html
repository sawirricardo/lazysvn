<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>LazySVN</title>
    <style>
      :root {
        --bg: #0f172a;
        --card: #111827;
        --text: #e5e7eb;
        --muted: #94a3b8;
        --accent: #22c55e;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font-family: "SF Mono", "Menlo", "Consolas", monospace;
        background: radial-gradient(circle at top right, #1e293b, var(--bg));
        color: var(--text);
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }
      .card {
        width: min(860px, 100%);
        background: color-mix(in oklab, var(--card) 90%, black);
        border: 1px solid #334155;
        border-radius: 14px;
        padding: 24px;
        box-shadow: 0 20px 45px rgba(0, 0, 0, 0.35);
      }
      h1 {
        margin: 0 0 8px;
        font-size: clamp(24px, 4vw, 36px);
      }
      p {
        margin: 0 0 16px;
        color: var(--muted);
      }
      pre {
        margin: 14px 0;
        background: #020617;
        color: var(--accent);
        border: 1px solid #334155;
        border-radius: 10px;
        padding: 14px;
        overflow-x: auto;
      }
      a {
        color: #93c5fd;
      }
      .small {
        font-size: 13px;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>LazySVN</h1>
      <p>LazyGit-style terminal UI for Subversion.</p>
      <pre><code>curl -fsSL https://lazysvn.sawirstudio.com/install.sh | sh</code></pre>
      <p class="small">
        Installer script:
        <a href="/install.sh">/install.sh</a>
      </p>
      <p class="small">
        Project source:
        <a href="https://github.com/sawirricardo/lazysvn">github.com/sawirricardo/lazysvn</a>
      </p>
    </main>
  </body>
</html>
